<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Sky Club — Executive Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1626; --panel:#0F2036; --panel-2:#122A47; --line:#1E3A5C;
  --map-fill:#132B4A; --map-stroke:#24466F;
  --blue:#5FA8F5; --ink:#E8EEF6; --muted:#8AA3BF; --dim:#5C7694;
  --good:#2ECC8F; --watch:#F5B84D; --alert:#F0475C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:20px 22px 34px}

/* ── Header ─────────────────────────── */
header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--line)}
.brand-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--blue);text-transform:uppercase;margin-bottom:6px}
h1{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:clamp(24px,3.4vw,34px);letter-spacing:.01em;text-transform:uppercase;line-height:1.05}
h1 span{color:var(--blue)}
.period{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);text-align:right;line-height:1.7}
.period b{color:var(--ink);font-weight:600}

/* ── KPI departure board ─────────────── */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0 14px}
.tile{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:8px;padding:13px 15px 11px;position:relative;overflow:hidden}
.tile::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--tone,var(--blue));opacity:.9}
.tile .lbl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.tile .val{font-family:'IBM Plex Mono',monospace;font-size:clamp(22px,2.6vw,30px);font-weight:600;margin-top:4px;letter-spacing:.02em}
.tile .sub{font-size:11px;color:var(--dim);margin-top:3px}
.tile .sub b{color:var(--muted);font-weight:500}
.tile .flag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5}
.tile .flag-lbl{font-family:'Barlow Semi Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;margin-right:7px}

/* ── Controls ────────────────────────── */
.controls{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--line);border-radius:999px;padding:6px 15px;cursor:pointer;transition:all .15s}
.chip:hover{color:var(--ink);border-color:var(--blue)}
.chip.on{color:#07111F;background:var(--blue);border-color:var(--blue)}
.chip:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.msel{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer}
.msel:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.g-tgt{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);margin-top:1px}
.legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}

/* ── Map + detail ────────────────────── */
.main{display:grid;grid-template-columns:1fr 320px;gap:14px;align-items:stretch}
.map-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;position:relative}
svg{width:100%;height:auto;display:block}
.state{fill:var(--map-fill);stroke:var(--map-stroke);stroke-width:.7;vector-effect:non-scaling-stroke}
.pin{cursor:pointer}
.pin circle.dot{stroke:#07111F;stroke-width:1.6;transition:r .15s}
.pin:hover circle.dot{r:8}
.pin text{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;fill:var(--ink);paint-order:stroke;stroke:#0A1626;stroke-width:3px;pointer-events:none}
.pulse{fill:none;stroke-width:1.5;opacity:0}
.pin.sel .pulse{animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{r:7;opacity:.85}100%{r:22;opacity:0}}
@media (prefers-reduced-motion: reduce){.pin.sel .pulse{animation:none;opacity:.5;r:12}}
.tooltip{position:absolute;pointer-events:none;background:#07111Fee;border:1px solid var(--line);border-radius:6px;padding:8px 11px;font-size:12px;line-height:1.55;opacity:0;transition:opacity .12s;z-index:5;min-width:150px}
.tooltip .tt-code{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--blue)}

/* ── Detail panel ────────────────────── */
.detail{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;display:flex;flex-direction:column;max-height:660px;overflow-y:auto}
.detail .empty{color:var(--dim);font-size:13px;line-height:1.7;margin:auto;text-align:center;padding:20px 8px}
.d-code{font-family:'Barlow Semi Condensed',sans-serif;font-size:34px;font-weight:700;letter-spacing:.03em;line-height:1}
.d-city{color:var(--muted);font-size:13px;margin-top:3px}
.d-region{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-top:8px}
.d-status{display:inline-block;font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;border-radius:5px;padding:4px 10px;margin-top:12px}
.d-targets{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--dim);margin-top:10px}
.lounge{border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-top:11px;background:var(--panel-2)}
.l-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.l-name{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em}
.l-pill{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;border:1px solid;border-radius:4px;padding:2px 7px;white-space:nowrap}
.l-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-top:10px}
.g-lbl{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.g-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;margin-top:2px}
.metric{margin-top:15px}
.metric .m-head{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.metric .m-head b{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--ink)}
.bar{height:5px;background:#0A1B30;border-radius:3px;margin-top:6px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:3px}
.m-tgt{font-size:10.5px;color:var(--dim);margin-top:4px}
.note{margin-top:14px;font-size:11px;color:var(--dim);line-height:1.6;border-top:1px solid var(--line);padding-top:10px}

@media (max-width:900px){
  .main{grid-template-columns:1fr}
  .board{grid-template-columns:repeat(2,1fr)}
  .period{text-align:left}
}
</style>
</head>

<div class="wrap">

    <select id="month-sel" class="msel" aria-label="Reporting month"></select>
    <select id="week-sel" class="msel" aria-label="Labor week"></select>
    <div class="legend">

      <span><i style="background:var(--watch)"></i>Watch</span>

  <div class="main">

    <aside class="detail" id="detail">
      <div class="empty">Select an airport pin to view lounge-level NSAT, food safety, labor hours, overtime, and food cost performance.</div>

</div>

function airportStatus(ap, lounges){
  const st = worst(lounges);
  const js = laborStatus(janFor(ap));  // same labor triggers apply to the janitorial line
  return RANK[js] > RANK[st] ? js : st;
}
const nsatTarget = code => (NSAT_TARGETS[code] && NSAT_TARGETS[code][month] != null) ? NSAT_TARGETS[code][month] : TARGETS.nsat.v;
const onTarget = (k,v,code) => k === 'nsat'
  ? v >= nsatTarget(code)
  : (TARGETS[k].dir === '>=' ? v >= TARGETS[k].v : v <= TARGETS[k].v);
function status(code, l){
  const misses = METRICS.filter(m => !onTarget(m.key, l[m.key], code)).length;
  let st = (l.foodSafety < 90 || misses >= 2) ? 'alert' : (misses === 1 ? 'watch' : 'good');
  const ls = laborStatus(laborFor(code));
  return RANK[ls] > RANK[st] ? ls : st;
}
const RANK = {good:0, watch:1, alert:2};
const airportOf = code => code.split(' ')[0];
function airportGroups(){
  const groups = {};
  Object.entries(LOUNGES).forEach(([code,l])=>{
    if (filter !== 'All' && l.region !== filter) return;
    const ap = airportOf(code);
    (groups[ap] = groups[ap] || []).push({code, ...l});
  });
  return groups;
}
const worst = lounges => lounges.reduce((w,l)=>RANK[status(l.code,l)]>RANK[w]?status(l.code,l):w, 'good');
const TONE = {good:'var(--good)', watch:'var(--watch)', alert:'var(--alert)'};
const SLABEL = {good:'On target', watch:'Watch', alert:'Action needed'};

/* ── build map ── */
const svg = document.getElementById('map');
const NS = 'http://www.w3.org/2000/svg';
const el = (t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e};

const gStates = el('g',{}); svg.appendChild(gStates);
MAP.states.forEach(s => gStates.appendChild(el('path',{d:s.d, class:'state'})));
svg.appendChild(el('path',{d:MAP.nation, fill:'none', stroke:'#385F8C', 'stroke-width':'1.1'}));

let filter = 'All', selected = null;
const gPins = el('g',{}); svg.appendChild(gPins);
const tooltip = document.getElementById('tooltip');

/* offset labels for tightly clustered airports */
const LABEL_OFF = { JFK:[14,10], LGA:[13,-6], EWR:[-38,2], PHL:[-38,10], FLL:[13,8], MIA:[13,10], PBI:[13,-2], MCO:[-42,-2], TPA:[-40,8] };

function drawPins(){
  gPins.innerHTML = '';
  const groups = airportGroups();
  Object.entries(groups).forEach(([ap, lounges])=>{
    const [x,y] = MAP.pins[ap], st = airportStatus(ap, lounges);
    const g = el('g',{class:'pin'+(selected===ap?' sel':''), transform:`translate(${x},${y})`, tabindex:'0', role:'button', 'aria-label':ap+', '+lounges.length+' lounge'+(lounges.length>1?'s':'')});
    g.appendChild(el('circle',{class:'pulse', r:'7', stroke:TONE[st]}));
    g.appendChild(el('circle',{class:'dot', r:'6.5', fill:TONE[st]}));
    if (lounges.length > 1){
      g.appendChild(el('circle',{cx:'7', cy:'-7', r:'5.5', fill:'#07111F', stroke:TONE[st], 'stroke-width':'1'}));
      const n = el('text',{x:'7', y:'-4.2', 'text-anchor':'middle', style:'font-size:8px;stroke:none'});
      n.textContent = lounges.length; g.appendChild(n);
    }
    const [ox,oy] = LABEL_OFF[ap] || [11,4];
    const t = el('text',{x:ox, y:oy}); t.textContent = ap; g.appendChild(t);
    g.addEventListener('click', ()=>select(ap));
    g.addEventListener('keydown', e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();select(ap)}});
    g.addEventListener('mouseenter', ()=>showTip(ap));
    g.addEventListener('mousemove', moveTip);
    g.addEventListener('mouseleave', ()=>tooltip.style.opacity=0);
    gPins.appendChild(g);
  });
}
function showTip(ap){
  const lounges = airportGroups()[ap]; if(!lounges) return;
  const avg = k => lounges.reduce((s,l)=>s+l[k],0)/lounges.length;
  const st = airportStatus(ap, lounges);
  const city = lounges[0].city.split(/ [\u00b7-] /)[0];
  tooltip.innerHTML = `<span class="tt-code">${ap}</span> \u00b7 ${city} \u00b7 ${lounges.length} lounge${lounges.length>1?'s':''}<br>
    NSAT <b>${avg('nsat').toFixed(1)}</b> \u00b7 Audit <b>${avg('foodSafety').toFixed(1)}%</b><br>
    ${(()=>{ const ls = lounges.map(l=>laborFor(l.code)).filter(Boolean);
      const j = janFor(ap); if (j) ls.push(j);
      if (!ls.length) return 'Labor <b>\u2014</b>';
      const bud = ls.reduce((s,x)=>s+x[0],0), act = ls.reduce((s,x)=>s+x[1],0), ot = ls.reduce((s,x)=>s+x[2],0);
      return `Hrs <b>${fmtHrs(act)}/${fmtHrs(bud)}</b> \u00b7 OT <b>${fmt$(ot)}</b>`; })()} \u00b7 Food cost <b>${avg('foodCost').toFixed(1)}%</b><br>
    <span style="color:${TONE[st]}">\u25cf ${SLABEL[st]}</span>${lounges.length>1?' <span style="color:var(--dim)">\u00b7 click for lounge detail</span>':''}`;
  tooltip.style.opacity = 1;
}
function moveTip(e){
  const r = svg.parentElement.getBoundingClientRect();
  let x = e.clientX - r.left + 14, y = e.clientY - r.top + 10;
  if (x + 190 > r.width) x -= 210;
  tooltip.style.left = x+'px'; tooltip.style.top = y+'px';
}

/* ── detail panel ── */
function select(ap){
  selected = ap; drawPins();
  const lounges = airportGroups()[ap]; if(!lounges) return;
  const city = lounges[0].city.split(/ [\u00b7-] /)[0];
  const d = document.getElementById('detail');
  d.innerHTML = `
    <div class="d-code">${ap}</div>
    <div class="d-city">${city} \u00b7 ${lounges.length} lounge${lounges.length>1?'s':''}</div>
    <div class="d-region">${lounges[0].region}</div>
    <div class="d-targets">${MONTH_NAMES[month]} \u00b7 NSAT vs lounge monthly target \u00b7 Audit \u2265${TARGETS.foodSafety.v} \u00b7 Food \u2264${TARGETS.foodCost.v} \u00b7 Labor: ${weekLabel(week)} hrs vs budget</div>
    ${lounges.map(l=>{
      const st = status(l.code, l);
      return `<div class="lounge">
        <div class="l-head"><span class="l-name">${l.code}</span>
          <span class="l-pill" style="color:${TONE[st]};border-color:${TONE[st]}">${SLABEL[st]}</span></div>
        <div class="l-grid">
          ${METRICS.map(m=>{
            const v = l[m.key], ok = onTarget(m.key, v, l.code);
            const tgt = m.key === 'nsat'
              ? '\u2265' + nsatTarget(l.code).toFixed(1) + ' \u00b7 ' + MONTH_NAMES[month].slice(0,3)
              : (TARGETS[m.key].dir === '>=' ? '\u2265' : '\u2264') + TARGETS[m.key].v;
            return `<div><div class="g-lbl">${m.label}</div>
              <div class="g-val" style="color:${ok?'var(--ink)':'var(--alert)'}">${v.toFixed(1)}${m.unit}</div>
              <div class="g-tgt">tgt ${tgt}</div></div>`;
          }).join('')}
          ${(()=>{ const lb = laborFor(l.code);
            if (!lb) return `<div><div class="g-lbl">Labor Hours</div><div class="g-val" style="color:var(--dim)">\u2014</div><div class="g-tgt">no data \u00b7 ${weekLabel(week)}</div></div>
                             <div><div class="g-lbl">Overtime</div><div class="g-val" style="color:var(--dim)">\u2014</div><div class="g-tgt">${weekLabel(week)}</div></div>`;
            const [bud, act, ot] = lb;
            const hc = act > bud ? 'var(--alert)' : (act < bud ? 'var(--watch)' : 'var(--ink)');
            const note = act > bud ? '+'+fmtHrs(act-bud)+' over budget' : (act < bud ? fmtHrs(bud-act)+' under budget' : 'at budget');
            return `<div><div class="g-lbl">Labor Hours</div>
              <div class="g-val" style="color:${hc}">${fmtHrs(act)}<span style="color:var(--dim);font-size:11px"> / ${fmtHrs(bud)}</span></div>
              <div class="g-tgt">${note} \u00b7 ${weekLabel(week)}</div></div>
            <div><div class="g-lbl">Overtime</div>
              <div class="g-val" style="color:${ot>0?'var(--alert)':'var(--ink)'}">${fmt$(ot)}</div>
              <div class="g-tgt">${ot>0?'OT triggers warning':'no OT'} \u00b7 ${weekLabel(week)}</div></div>`; })()}
        </div>
      </div>`;
    }).join('')}
    ${(()=>{ const j = janFor(ap);
      if (!j) return ap === 'JAX' ? '<div class="d-targets" style="margin-top:12px">No janitorial line at JAX</div>' : '';
      const [bud, act, ot] = j, jst = laborStatus(j);
      const JLBL = {alert:'Over / OT', watch:'Under budget', good:'At budget'};
      const hc = act > bud ? 'var(--alert)' : (act < bud ? 'var(--watch)' : 'var(--ink)');
      const note = act > bud ? '+'+fmtHrs(act-bud)+' over budget' : (act < bud ? fmtHrs(bud-act)+' under budget' : 'at budget');
      return `<div class="lounge" style="border-style:dashed">
        <div class="l-head"><span class="l-name">JANITORIAL</span>
          <span class="l-pill" style="color:${TONE[jst]};border-color:${TONE[jst]}">${JLBL[jst]}</span></div>
        <div class="l-grid">
          <div><div class="g-lbl">Labor Hours</div>
            <div class="g-val" style="color:${hc}">${fmtHrs(act)}<span style="color:var(--dim);font-size:11px"> / ${fmtHrs(bud)}</span></div>
            <div class="g-tgt">${note} \u00b7 ${weekLabel(week)}</div></div>
          <div><div class="g-lbl">Overtime</div>
            <div class="g-val" style="color:${ot>0?'var(--alert)':'var(--ink)'}">${fmt$(ot)}</div>
            <div class="g-tgt">${ot>0?'OT triggers warning':'no OT'} \u00b7 ${weekLabel(week)}</div></div>
        </div>
        ${lounges.length>1 ? '<div class="g-tgt" style="margin-top:8px">One shared line covering all '+lounges.length+' '+ap+' lounges</div>' : ''}
      </div>`; })()}
    <div class="note">Sample data shown \u2014 update sky-club-dashboard-data.csv (or the LOUNGES object) with live figures each period.</div>`;
}

/* ── KPI board (network or filtered rollup) ── */
function rollup(){
  const rows = Object.entries(LOUNGES).filter(([c,l]) => filter==='All' || l.region===filter).map(([code,l])=>({code,...l}));
  const avg = k => rows.reduce((s,l)=>s+l[k],0)/rows.length;
  const board = document.getElementById('board');
  const tiles = [];
  METRICS.forEach(m=>{
    const v = avg(m.key);
    const off = rows.filter(l=>!onTarget(m.key,l[m.key],l.code)).length;
    const goal = m.key === 'nsat'
      ? 'lounge targets \u00b7 ' + MONTH_NAMES[month].slice(0,3) + ' avg \u2265' + (rows.reduce((s,l)=>s+nsatTarget(l.code),0)/rows.length).toFixed(1)
      : 'goal ' + (TARGETS[m.key].dir==='>=' ? '\u2265' : '\u2264') + TARGETS[m.key].v + '%';
    tiles.push(`<div class="tile" style="--tone:${off===0?'var(--good)':(off<=2?'var(--watch)':'var(--alert)')}">
      <div class="lbl">${m.label}</div>
      <div class="val">${v.toFixed(1)}${m.unit}</div>
      <div class="sub"><b>${rows.length - off}/${rows.length}</b> lounges on target \u00b7 ${goal}</div>
    </div>`);
  });
  const ls = rows.map(l=>({...l, lb: laborFor(l.code)})).filter(l=>l.lb);
  const aps = [...new Set(rows.map(l=>airportOf(l.code)))];
  const js = aps.map(janFor).filter(Boolean);
  let laborTile;
  if (ls.length || js.length){
    const all = ls.map(l=>l.lb).concat(js);
    const bud = all.reduce((s,x)=>s+x[0],0), act = all.reduce((s,x)=>s+x[1],0), ot = all.reduce((s,x)=>s+x[2],0);
    const nWarn = all.filter(x=>laborStatus(x)==='alert').length;   // over budget or OT
    const nUnder = all.filter(x=>laborStatus(x)==='watch').length;  // under budget
    const pct = act/bud*100;
    const tone = nWarn > 0 ? 'var(--alert)' : (nUnder > 0 ? 'var(--watch)' : 'var(--good)');
    laborTile = `<div class="tile" style="--tone:${tone}">
      <div class="lbl">Labor \u00b7 Hrs vs Budget</div>
      <div class="val">${pct.toFixed(1)}%</div>
      <div class="sub"><b>${nWarn}</b> over/OT \u00b7 <b>${nUnder}</b> under \u00b7 <b>${all.length - nWarn - nUnder}</b> at budget \u00b7 OT ${fmt$(ot)} \u00b7 ${weekLabel(week)}</div>
    </div>`;
  } else {
    laborTile = `<div class="tile"><div class="lbl">Labor \u00b7 Hrs vs Budget</div>
      <div class="val" style="color:var(--dim)">\u2014</div>
      <div class="sub">no labor data for ${weekLabel(week)}</div></div>`;
  }
  tiles.splice(2, 0, laborTile);  // NSAT, Audit, Labor, Food Cost
  board.innerHTML = tiles.join('');
}

/* ── region chips ── */
const REGIONS = ['All','Delta Northeast','Delta Mid Atlantic','Atlanta','Delta South'];
const chips = document.getElementById('chips');
REGIONS.forEach(r=>{
  const b = document.createElement('button');
  b.className = 'chip'+(r==='All'?' on':''); b.textContent = r; b.setAttribute('role','tab');
  b.onclick = ()=>{
    filter = r;
    document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c===b));
    if (selected && !airportGroups()[selected]){ selected=null;
      document.getElementById('detail').innerHTML='<div class="empty">Select an airport pin to view lounge-level performance.</div>'; }
    drawPins(); rollup();
  };
  chips.appendChild(b);
});

/* ── CSV import ──
   Actuals headers: code,city,region,nsat,food_safety,food_cost (labor
   column tolerated but ignored). Weekly labor file headers:
   week_ending,code,department,budgeted_hours,actual_hours,overtime_dollars
   (department: Lounge or Janitorial — janitorial is airport-level)
   Lounge codes must start with a mapped airport code (e.g. 'ATL C',\n   'BOS MAIN'); rows for unmapped airports are skipped. */
function applyCSV(text, label){
    const lines = text.trim().split(/\r?\n/);
    const head = lines[0].split(',').map(h=>h.trim().toLowerCase());
    const idx = k => head.indexOf(k);
    const req = ['code','city','region','nsat','food_safety','food_cost'];
    if (req.some(k=>idx(k)<0)){ alert('CSV is missing one of the required columns: '+req.join(', ')); return; }
    const skipped = [];
    for (const k in LOUNGES) delete LOUNGES[k];
    lines.slice(1).forEach(line=>{
      if(!line.trim()) return;
      const c = line.split(',').map(s=>s.trim());
      const code = c[idx('code')].toUpperCase();
      if (!MAP.pins[airportOf(code)]){ skipped.push(code); return; }
      LOUNGES[code] = { city:c[idx('city')], region:c[idx('region')],
        nsat:+c[idx('nsat')], foodSafety:+c[idx('food_safety')],
        foodCost:+c[idx('food_cost')] };
    });
    selected = null;
    document.getElementById('detail').innerHTML='<div class="empty">Select an airport pin to view lounge-level performance.</div>';
    drawPins(); rollup();
    if (label){
      document.getElementById('period-label').textContent = label;
      const mi = MONTH_NAMES.findIndex(n => label.toLowerCase().includes(n.toLowerCase()));
      if (mi >= 0){ month = mi; document.getElementById('month-sel').value = mi; }
    }
    if (skipped.length) alert('No map position for: '+skipped.join(', ')+' — these rows were skipped.');
}

document.getElementById('csv-btn').onclick = ()=>document.getElementById('csv-file').click();
document.getElementById('csv-file').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const firstLines = reader.result.trim().split(/\r?\n/).filter(l=>!l.startsWith('#'));
    const head = (firstLines[0]||'').toLowerCase();
    if (head.includes('budgeted_hours')) applyLaborCSV(reader.result);
    else if (head.includes('jan') && head.includes('dec')) applyTargetsCSV(reader.result);
    else applyCSV(reader.result, f.name.replace(/\.csv$/i,''));
  };
  reader.readAsText(f);
  e.target.value = '';
});

/* ── month selector ── */
const msel = document.getElementById('month-sel');
MONTH_NAMES.forEach((n,i)=>{
  const o = document.createElement('option');
  o.value = i; o.textContent = n; if (i===month) o.selected = true;
  msel.appendChild(o);
});
const wsel = document.getElementById('week-sel');
function buildWeekOptions(){
  wsel.innerHTML = '';
  Object.keys(LABOR).sort().forEach(w=>{
    const o = document.createElement('option');
    o.value = w; o.textContent = 'Labor ' + weekLabel(w); if (w===week) o.selected = true;
    wsel.appendChild(o);
  });
}
buildWeekOptions();
wsel.addEventListener('change', ()=>{
  week = wsel.value;
  drawPins(); rollup();
  if (selected) select(selected);
});
msel.addEventListener('change', ()=>{
  month = +msel.value;
  drawPins(); rollup();
  if (selected) select(selected);
});

/* ── NSAT targets CSV ──
   Format: code,jan,feb,mar,apr,may,jun,jul,aug,sep,oct,nov,dec
   Hosted alongside the dashboard as nsat-targets.csv — edit that
   file to change any lounge's target for any month. */
function applyLaborCSV(text){
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim() && !l.startsWith('#'));
  const head = lines[0].split(',').map(h=>h.trim().toLowerCase());
  const idx = k => head.indexOf(k);
  const req = ['week_ending','code','budgeted_hours','actual_hours','overtime_dollars'];
  if (req.some(k=>idx(k)<0)){ alert('Labor CSV is missing one of: '+req.join(', ')); return; }
  for (const k in LABOR) delete LABOR[k];
  for (const k in JANITORIAL) delete JANITORIAL[k];
  const dep = idx('department');  // optional column; rows default to Lounge
  const toISO = s => {
    const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (!m) return s;
    const y = m[3].length === 2 ? '20'+m[3] : m[3];
    return y+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  };
  lines.slice(1).forEach(line=>{
    const c = line.split(',').map(s=>s.trim());
    const w = toISO(c[idx('week_ending')]), code = c[idx('code')].toUpperCase();
    if (!MAP.pins[airportOf(code)]) return;
    const vals = [+c[idx('budgeted_hours')], +c[idx('actual_hours')], +c[idx('overtime_dollars')]];
    if (dep >= 0 && /^jan/i.test(c[dep] || '')){
      (JANITORIAL[w] = JANITORIAL[w] || {})[airportOf(code)] = vals;
    } else {
      (LABOR[w] = LABOR[w] || {})[code] = vals;
    }
  });
  const wk = Object.keys(LABOR).sort();
  week = wk[wk.length-1];
  buildWeekOptions();
  drawPins(); rollup();
  if (selected) select(selected);
}

function applyTargetsCSV(text){
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim() && !l.startsWith('#'));
  const head = lines[0].split(',').map(h=>h.trim().toLowerCase());
  if (head[0] !== 'code' || head.length < 13) return;
  for (const k in NSAT_TARGETS) delete NSAT_TARGETS[k];
  lines.slice(1).forEach(line=>{
    const c = line.split(',').map(s=>s.trim());
    NSAT_TARGETS[c[0].toUpperCase()] = c.slice(1,13).map(Number);
  });
  drawPins(); rollup();
  if (selected) select(selected);
}
fetch('labor-weekly.csv', {cache:'no-store'})
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(applyLaborCSV)
  .catch(()=>{});
fetch('nsat-targets.csv', {cache:'no-store'})
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(applyTargetsCSV)
  .catch(()=>{});

/* ── Live data source ──
   When hosted (e.g. GitHub Pages), the dashboard auto-loads
   sky-club-dashboard-data.csv from the same folder on every visit.
   Update that file in the repo and the site updates itself.
   Optional first line in the CSV: "# period: June 2026 MTD"
   sets the reporting-period label. Falls back silently to the
   embedded sample data when no CSV is found (e.g. opened locally). */
fetch('sky-club-dashboard-data.csv', {cache:'no-store'})
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(text => {
    let label = null;
    if (text.startsWith('#')){
      const nl = text.indexOf('\n');
      const m = text.slice(0, nl).match(/period:\s*(.+)/i);
      if (m) label = m[1].replace(/,+\s*$/,'').trim();
      text = text.slice(nl + 1);
    }
    applyCSV(text, label);
  })
  .catch(()=>{});

drawPins(); rollup();
</script>
